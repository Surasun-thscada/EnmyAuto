<div class="flex h-screen bg-slate-950 overflow-hidden">

  <!-- ══════════════════════════════════════════════
       MOBILE OVERLAY
  ══════════════════════════════════════════════ -->
  @if (sidebarOpen()) {
    <div class="fixed inset-0 z-20 bg-black/60 lg:hidden"
         (click)="sidebarOpen.set(false)"></div>
  }

  <!-- ══════════════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════════════ -->
  <aside
    class="fixed inset-y-0 left-0 z-30 flex w-64 flex-col
           bg-slate-900 border-r border-white/5
           transition-transform duration-300 ease-in-out
           lg:static lg:translate-x-0"
    [class.-translate-x-full]="!sidebarOpen()"
    [class.translate-x-0]="sidebarOpen()">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-5 py-5 border-b border-white/5">
      <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-indigo-600 shadow-lg shadow-indigo-500/30">
        <svg class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 10l4.553-2.069A1 1 0 0121 8.868V15.13a1 1 0 01-1.447.9L15 14
                   M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
        </svg>
      </div>
      <div>
        <p class="text-sm font-extrabold text-white tracking-tight">EnMY Auto</p>
        <p class="text-[10px] text-slate-500 leading-none mt-0.5">AI Content Generator</p>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto px-3 py-4 space-y-1">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-indigo-600/20 text-indigo-300 border-indigo-500/40"
          [routerLinkActiveOptions]="{ exact: false }"
          (click)="sidebarOpen.set(false)"
          class="group flex items-center gap-3 rounded-xl border border-transparent
                 px-3 py-2.5 text-sm font-medium text-slate-400
                 hover:bg-white/5 hover:text-slate-200 transition-all duration-150">
          <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" [attr.d]="item.icon"/>
          </svg>
          {{ item.label }}
        </a>
      }
    </nav>

    <!-- User + Logout -->
    <div class="border-t border-white/5 p-3 space-y-1">
      <!-- User info -->
      <div class="flex items-center gap-3 rounded-xl px-3 py-2.5">
        <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full
                    bg-gradient-to-br from-indigo-500 to-violet-600 text-xs font-bold text-white">
          {{ (user()?.name ?? 'U')[0].toUpperCase() }}
        </div>
        <div class="min-w-0">
          <p class="truncate text-sm font-medium text-slate-200">{{ user()?.name }}</p>
          <p class="truncate text-xs text-slate-500">{{ user()?.email }}</p>
        </div>
      </div>

      <!-- Quota badge -->
      <div class="flex items-center justify-between rounded-xl bg-slate-800/60 px-3 py-2">
        <span class="text-xs text-slate-400">Daily Quota</span>
        <span class="text-xs font-semibold text-indigo-300">{{ user()?.quotaLimit ?? 0 }} remaining</span>
      </div>

      <!-- Logout -->
      <button
        type="button"
        (click)="logout()"
        class="flex w-full items-center gap-3 rounded-xl px-3 py-2.5 text-sm
               text-slate-400 hover:bg-red-500/10 hover:text-red-400 transition-colors">
        <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Sign Out
      </button>
    </div>
  </aside>

  <!-- ══════════════════════════════════════════════
       MAIN AREA
  ══════════════════════════════════════════════ -->
  <div class="flex flex-1 flex-col min-w-0 overflow-hidden">

    <!-- Top bar (mobile) -->
    <header class="flex items-center gap-4 border-b border-white/5 bg-slate-900/80
                   backdrop-blur px-4 py-3 lg:hidden">
      <button type="button"
              (click)="sidebarOpen.set(!sidebarOpen())"
              class="text-slate-400 hover:text-white transition-colors">
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <span class="text-sm font-bold text-white">EnMY Auto</span>
    </header>

    <!-- Page content -->
    <main class="flex-1 overflow-y-auto">
      <router-outlet />
    </main>

  </div>
</div>
